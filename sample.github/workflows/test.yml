name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install Go dependencies
        run: go mod download
      
      - name: Install Node.js dependencies
        run: npm ci
      
      - name: Run Go tests
        run: go test ./... -v
      
      - name: Run frontend tests
        run: npm run test:run
