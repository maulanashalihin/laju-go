name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      # Setup Go
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      
      # Setup Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      # Install dependencies
      - name: Install Go dependencies
        run: go mod download
      
      - name: Install Node.js dependencies
        run: npm ci
      
      # Build
      - name: Build frontend
        run: npm run build
      
      - name: Build Go binary (Linux x64)
        run: GOOS=linux GOARCH=amd64 go build -o laju-go .
      
      # Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: laju-go-build
          path: |
            laju-go
            dist/
            templates/
            migrations/
            public/
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: laju-go-build
          path: ./deploy
      
      # Deploy via SSH/SCP
      - name: Deploy to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "deploy/"
          target: "/opt/laju-go"
          strip_components: 1
      
      - name: Restart service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo systemctl daemon-reload
            sudo systemctl restart laju-go
            sudo systemctl status laju-go --no-pager
